<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration Form</title>

</head>
<style> 
    body{
    background:#6c3cff;
}

body{
    background:#6c3cff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}


.form-container{

    background:white;

    width:350px;

    padding:30px;

    border-radius:12px;

    box-shadow:0 4px 20px rgba(0,0,0,.2);

}

h2{

text-align:center;

margin-bottom:20px;

color:#5b2dd1;

}

input{

width:100%;

padding:10px;

margin-bottom:15px;

border:1px solid #ccc;

border-radius:5px;

box-sizing:border-box;

}

select{

width:100%;

padding:10px;

margin-bottom:20px;

border:1px solid #ccc;

border-radius:5px;

}

.gender{

margin-bottom:20px;

}

.gender input{

width:auto;

}

button{

width:100%;

padding:12px;

background:#6c3cff;

color:white;

font-size:16px;

border:none;

border-radius:5px;

cursor:pointer;

}

button:hover{

background:#5325c8;

}
</style>
<div class="form-container">

<h2>Registration Form</h2>

<form>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<div class="gender">
<label><input type="radio" name="gender"> Male</label>

<label><input type="radio" name="gender"> Female</label>

<label><input type="radio" name="gender"> Other</label>
</div>

<select>
<option>Select Course</option>
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
</select>

<button>Submit</button>

</form>

</div>
</body>
</html>
